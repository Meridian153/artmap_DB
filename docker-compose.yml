version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: artmap-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-artmap}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-artmap123}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-artmap}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - artmap-network

volumes:
  postgres_data:
    driver: local

networks:
  artmap-network:
    driver: bridge
