# ============================================================
# Wikidata SPARQL 검색 대상 리스트
# ------------------------------------------------------------
# 이 파일에 미술관(collection) / 제작자(creator)를 추가하면
# scripts/ingest_wikidata_by_list.py 가 자동으로 검색 + 저장합니다.
#
# 사용법:
#   python3 scripts/ingest_wikidata_by_list.py
#   python3 scripts/ingest_wikidata_by_list.py --dry-run   # 미리보기 (DB 저장 안 함)
#   python3 scripts/ingest_wikidata_by_list.py --output results.csv  # CSV 경로 지정
#
# ⚠️ Wikidata ID는 artists_data.py / museums_data.py에서 검증된 값만 사용
# ⚠️ name은 로그/CSV 식별용이며 SPARQL 검색에는 wikidata_id만 사용됨
# ============================================================

# 작품 수집 상한 (미술관당 / 제작자당)
default_limit: 70

# ----------------------------------------------------------
# 소장처(미술관) 30곳 — 파이프 라인 구축 계획.md 기준
# Wikidata ID 출처: scripts/data/museums_data.py (검증 완료)
# ----------------------------------------------------------
